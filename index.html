<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Triangle2d</title>

  </head>
  <body>
    <div class="wrapper">
      <div class="virtual">
        <canvas id="canvas" width="288" height="512"></canvas>
        <button id="rightbtn">→</button>
        <button id="leftbtn">←</button>

        </div>
        <script type="module" src="./js/main.js"></script>
      </div>
    </div>
  </body>
</html>
